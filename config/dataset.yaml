paths:
  # Rutas relativas a DATASET_ROOT
  raw_dir: "clean"
  split_output_dir: "splits/seed_42"

dataset:
  target_size: [224, 224]
  seed: 42
  classes:
    - common_rust
    - fall_armyworm
    - gray_leaf_spot
    - healthy
    - lethal_necrosis
    - nitrogen_deficiency
    - northern_corn_leaf_blight
    - phosphorus_deficiency
    - potassium_deficiency

# Perfil reducido para el pipeline de baselines (scripts/pipeline/train_baselines.py).
# Se activa con `create_splits.py --baseline` / `make splits-baseline`.
# No afecta a `dataset.classes` ni al pipeline principal (train.py).
baseline:
  classes:
    - healthy
    - common_rust
    - fall_armyworm
    - nitrogen_deficiency
  max_images_per_class: 500
  seed: 42
